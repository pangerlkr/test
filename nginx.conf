server {
    listen 80;
    server_name nscw.nagaland.gov.in www.nscw.nagaland.gov.in;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name nscw.nagaland.gov.in www.nscw.nagaland.gov.in;

    root /var/www/nscw;
    index Home.html;

    # ── 301 Redirects: .html extensions → clean URLs ──────────────────────
    rewrite ^/Home\.html$            /         permanent;
    rewrite ^/About\.html$           /about    permanent;
    rewrite ^/Legal_Framework\.html$ /legal-framework permanent;
    rewrite ^/The_Chronicle\.html$   /updates  permanent;
    rewrite ^/Connect\.html$         /connect  permanent;
    rewrite ^/Support\.html$         /support  permanent;
    rewrite ^/Privacy\.html$         /privacy  permanent;
    rewrite ^/Reports\.html$         /reports  permanent;

    # ── Clean URL → file mapping ────────────────────────────────────────────
    location = / {
        try_files /Home.html =404;
    }
    location = /about {
        try_files /About.html =404;
    }
    location = /legal-framework {
        try_files /Legal_Framework.html =404;
    }
    location = /updates {
        try_files /The_Chronicle.html =404;
    }
    location = /connect {
        try_files /Connect.html =404;
    }
    location = /support {
        try_files /Support.html =404;
    }
    location = /privacy {
        try_files /Privacy.html =404;
    }
    location = /reports {
        try_files /Reports.html =404;
    }

    # ── Static assets pass-through (images, css, js, fonts) ───────────────
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|css|js|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com https://maps.googleapis.com https://maps.gstatic.com https://*.googleapis.com https://*.gstatic.com; frame-src https://www.google.com https://maps.google.com;" always;

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1000;
}
