<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>404 - Page Not Found | NSCW Nagaland</title>
    <!-- Favicon -->
    <link rel="icon" href="images/nscw.png" type="image/jpeg">
    <link rel="apple-touch-icon" href="images/nscw.jpg">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="styles/tailwind.css"/>
</head>
<body class="bg-white font-serif min-h-screen flex items-center justify-center m-0">
    <section class="bg-white font-serif min-h-screen flex items-center justify-center w-full">
        <div class="container mx-auto">
            <div class="flex justify-center">
                <div class="w-full sm:w-10/12 md:w-8/12 text-center px-4">
                    <div
                        class="bg-[url(https://cdn.dribbble.com/users/285475/screenshots/2083086/dribbble_1.gif)] h-[250px] sm:h-[350px] md:h-[400px] bg-center bg-no-repeat bg-contain"
                        aria-hidden="true"
                    >
                        <h1 class="text-center text-black text-6xl sm:text-7xl md:text-8xl pt-6 sm:pt-8 font-bold">
                            404
                        </h1>
                    </div>

                    <div class="mt-[-50px]">
                        <h3 class="text-2xl text-black sm:text-3xl font-bold mb-4">
                            Look like you're lost
                        </h3>
                        <p class="mb-6 text-black sm:mb-5">
                            The page you are looking for is not available!
                        </p>

                        <button
                            onclick="window.location.href='/'"
                            class="my-5 inline-block bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-md font-bold transition-colors cursor-pointer"
                        >
                            Go to Home
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
